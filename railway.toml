# Railway — деплой backend (apps/api) из Dockerfile.
# Переменные (JWT_SECRET, DATABASE_URL, ALLOWED_ORIGINS, ADMIN_EMAIL, ADMIN_PASSWORD)
# задаются в Railway → Variables. PORT Railway выставляет автоматически.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
